<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#02040a"/>
  <!-- the pulse: what he sends out, and what comes back -->
  <circle cx="32" cy="34" r="26" fill="none" stroke="#8fe8ff" stroke-width="1" opacity=".18"/>
  <circle cx="32" cy="34" r="19" fill="none" stroke="#8fe8ff" stroke-width="1.4" opacity=".34"/>
  <circle cx="32" cy="34" r="12" fill="none" stroke="#8fe8ff" stroke-width="1.8" opacity=".6"/>
  <!-- Rocky: a carapace and five legs, no face at all. Legs drawn FIRST, tops pinned up inside the
       carapace (y35, within the body y30-39); the carapace then draws on top and hides the joins.
       Thin, spread across his width, and fanning out about each pinned top so the feet splay WIDER
       than the shell — five distinct legs with clear air between them, not one solid wedge. -->
  <g fill="#8a4a30">
    <rect x="24.6" y="35" width="1.6" height="13" transform="rotate(-15 25.4 35)"/>
    <rect x="28.0" y="35" width="1.6" height="14.5" transform="rotate(-7 28.8 35)"/>
    <rect x="31.4" y="35" width="1.6" height="15"/>
    <rect x="34.8" y="35" width="1.6" height="14.5" transform="rotate(7 35.6 35)"/>
    <rect x="38.2" y="35" width="1.6" height="13" transform="rotate(15 39.0 35)"/>
  </g>
  <rect x="24" y="30" width="16" height="9" rx="1.5" fill="#ff9a3c"/>
  <rect x="28" y="26" width="8" height="5" rx="1" fill="#ffb96e"/>
</svg>
