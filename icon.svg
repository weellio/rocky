<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#02040a"/>
  <!-- the pulse: what he sends out, and what comes back -->
  <circle cx="32" cy="34" r="26" fill="none" stroke="#8fe8ff" stroke-width="1" opacity=".18"/>
  <circle cx="32" cy="34" r="19" fill="none" stroke="#8fe8ff" stroke-width="1.4" opacity=".34"/>
  <circle cx="32" cy="34" r="12" fill="none" stroke="#8fe8ff" stroke-width="1.8" opacity=".6"/>
  <!-- Rocky: a carapace and five legs, no face at all. The legs are drawn FIRST and their tops
       run UP INTO the body (to y34, well inside the carapace at y30-39), so the carapace covers
       where they join and they read as attached — not a detached row sitting below him. -->
  <g fill="#8a4a30">
    <rect x="23" y="34" width="3" height="12"/>
    <rect x="27" y="35" width="3" height="13"/>
    <rect x="32" y="35" width="3" height="13"/>
    <rect x="37" y="34" width="3" height="12"/>
    <rect x="40" y="33" width="3" height="9" transform="rotate(18 41 37)"/>
  </g>
  <rect x="24" y="30" width="16" height="9" rx="1" fill="#ff9a3c"/>
  <rect x="28" y="26" width="8" height="5" rx="1" fill="#ffb96e"/>
</svg>
